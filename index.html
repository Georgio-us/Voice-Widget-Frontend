<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dubai Mini App</title>
  <link rel="stylesheet" href="telegram-miniapp.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script type="module">
    const isTelegramMiniApp = !!(window.Telegram && window.Telegram.WebApp);
    const root = document.getElementById('root');

    if (isTelegramMiniApp) {
      document.documentElement.classList.add('telegram-miniapp');
      document.body.classList.add('telegram-miniapp');
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();

      const { mountTelegramMiniApp } = await import('./telegram-miniapp.js');
      mountTelegramMiniApp(root);
    } else {
      await import('./voice-widget-v1.js');
      const widget = document.createElement('voice-widget');
      widget.setAttribute('api-url', 'https://voice-widget-backend-dubai.up.railway.app/api/audio/upload');
      widget.setAttribute('field-name', 'audio');
      widget.setAttribute('response-field', 'response');
      root.appendChild(widget);
    }
  </script>

</body>
</html>

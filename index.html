<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Widget Demo</title>
  <link rel="stylesheet" href="voice-widget.css" />
</head>
<body>
  

  <!-- Компонент виджета v1 -->
  <voice-widget
    api-url="https://voice-widget-backend-dubai.up.railway.app/api/audio/upload"
    field-name="audio"
    response-field="response">
  </voice-widget>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }
  </script>

  <!-- Подключение JS-модуля v1 -->
  <script type="module" src="voice-widget-v1.js"></script>




</body>
</html>
